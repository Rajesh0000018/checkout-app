version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CheckoutOS — docker-compose for local end-to-end development
# Copy .env.example → .env and adjust values before running.
# Usage:
#   docker compose up --build
#   docker compose down -v          # also removes the postgres volume
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Pricing ─────────────────────────────────────────────────────────────────
  pricing:
    build: ./pricing
    environment:
      PORT:      ${PRICING_PORT}
      FLASK_ENV: production
      CURRENCY:  GBP
    ports:
      - "${PRICING_PORT}:${PRICING_PORT}"

  # ── Inventory ───────────────────────────────────────────────────────────────
  inventory:
    build: ./inventory
    environment:
      PORT:      ${INVENTORY_PORT}
      FLASK_ENV: production
    ports:
      - "${INVENTORY_PORT}:${INVENTORY_PORT}"

  # ── Quote ───────────────────────────────────────────────────────────────────
  quote:
    build: ./quote
    environment:
      PORT:      ${QUOTE_PORT}
      FLASK_ENV: production
      CURRENCY:  GBP
    ports:
      - "${QUOTE_PORT}:${QUOTE_PORT}"

  # ── Checkout ─────────────────────────────────────────────────────────────────
  checkout:
    build: ./checkout
    environment:
      PORT:                ${CHECKOUT_PORT}
      FLASK_ENV:           production
      PRICING_URL:         http://pricing:${PRICING_PORT}
      INVENTORY_URL:       http://inventory:${INVENTORY_PORT}
      REQUEST_TIMEOUT_MS:  ${REQUEST_TIMEOUT_MS}
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             ${DB_NAME}
      DB_USER:             ${DB_USER}
      DB_PASSWORD:         ${DB_PASSWORD}
    ports:
      - "${CHECKOUT_PORT}:${CHECKOUT_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      pricing:
        condition: service_started
      inventory:
        condition: service_started

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    environment:
      PORT:                ${GATEWAY_PORT}
      FLASK_ENV:           production
      CHECKOUT_URL:        http://checkout:${CHECKOUT_PORT}
      QUOTE_URL:           http://quote:${QUOTE_PORT}
      REQUEST_TIMEOUT_MS:  ${REQUEST_TIMEOUT_MS}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      - checkout
      - quote

volumes:
  pgdata:
